<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Scavenger Hunt Checkpoints</title>

<style>
body { font-family: Arial; background:#f7f7fb; text-align:center; }
.card { background:white; margin:20px auto; padding:20px; border-radius:16px; max-width:600px; }
button { padding:12px 16px; border:none; border-radius:10px; margin:5px; cursor:pointer; }
.start { background:#4f46e5; color:white; }
.secondary { background:#6b7280; color:white; }
.success { background:#16a34a; color:white; }
.danger { background:#b91c1c; color:white; }
.status { margin-top:10px; padding:10px; border-radius:10px; }
.grid { display:grid; grid-template-columns: repeat(4,1fr); gap:10px; margin-top:10px; }
.box { padding:10px; border-radius:10px; background:#ddd; }
.found { background:#86efac; }
</style>
</head>

<body>

<div class="card" id="startScreen">
<h1>📍 Scavenger Hunt</h1>

<button class="start" onclick="start()">Start Hunt</button>
<button class="danger" onclick="reset()">Reset Progress</button>

<p>Progress stays on this device for 24 hours.</p>
</div>

<div class="card" id="huntScreen" style="display:none;">
<h2 id="progress">0 of 12 found</h2>

<p id="checkpointText">Scan a QR code</p>

<button class="success" onclick="claim()">Claim Checkpoint</button>
<button class="secondary" onclick="home()">Return</button>

<div id="status" class="status"></div>

<div id="grid" class="grid"></div>
</div>

<div class="card" id="doneScreen" style="display:none;">
<h2>🎉 Complete</h2>
<p>Show this screen</p>
<button onclick="reset()">Play Again</button>
</div>

<script>
const TOTAL = 12;
const KEY = "hunt";
const EXP = "hunt_exp";

let found = [];
let current = null;

function load() {
  let exp = localStorage.getItem(EXP);
  if (!exp || Date.now() > exp) {
    localStorage.removeItem(KEY);
    localStorage.removeItem(EXP);
    return [];
  }
  return JSON.parse(localStorage.getItem(KEY) || "[]");
}

function save() {
  localStorage.setItem(KEY, JSON.stringify(found));
  localStorage.setItem(EXP, Date.now() + 24*60*60*1000);
}

function reset() {
  if (!confirm("Reset progress?")) return;
  localStorage.clear();
  found = [];
  render();
  home();
}

function start() {
  read();
  show("huntScreen");
}

function home() {
  show("startScreen");
}

function show(id) {
  document.getElementById("startScreen").style.display="none";
  document.getElementById("huntScreen").style.display="none";
  document.getElementById("doneScreen").style.display="none";
  document.getElementById(id).style.display="block";
}

function read() {
  const p = new URLSearchParams(window.location.search);
  const c = p.get("checkpoint");

  if (c) {
    current = c;
    document.getElementById("checkpointText").innerText = "Checkpoint " + c + " loaded";
  } else {
    current = null;
  }
}

function claim() {
  if (!current) {
    set("Scan a checkpoint first", "red");
    return;
  }

  if (found.includes(current)) {
    set("Already found", "red");
    return;
  }

  found.push(current);
  save();
  render();
  set("Checkpoint added", "green");

  if (found.length == TOTAL) {
    show("doneScreen");
  }
}

function render() {
  document.getElementById("progress").innerText =
    found.length + " of " + TOTAL + " found";

  let grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (let i=1;i<=TOTAL;i++) {
    let d = document.createElement("div");
    d.className = "box";
    if (found.includes(String(i))) d.classList.add("found");
    d.innerText = i;
    grid.appendChild(d);
  }
}

function set(text,color) {
  let el = document.getElementById("status");
  el.innerText = text;
  el.style.color = color;
}

found = load();
render();
</script>

</body>
</html>
